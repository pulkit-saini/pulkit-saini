name: Generate Arkanoid Contribution Game

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVG (light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/arkanoid.svg?color_snake=7C83FD&color_dots=#0d1117,#1a1f35,#302b63,#534AB7,#7C83FD&color_empty=#0d1117

      - name: Generate snake SVG (dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/arkanoid-dark.svg?color_snake=FF6B6B&color_dots=#161b22,#1a2535,#253356,#3d5a8a,#7C83FD&color_empty=#161b22

      - name: Push to output branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b output
          git add .
          git commit -m "chore: update arkanoid svg"
          git push --force "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" output
